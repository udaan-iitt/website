name: Submodule Sync
on:
  workflow_dispatch: ~

# This explicitly gives the action permission to push the new commit
permissions:
  contents: write 

jobs:
  submodule-sync:
    name: Submodule Sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4 # Upgraded to v4 to fix the Node warning
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        submodules: true
        ref: ${{ github.ref }} # Ensures we are on the actual branch, not a detached HEAD

    - name: Git Submodule Update
      run: |
        # 1. Sync the configuration changes
        git submodule sync --recursive
        
        # 2. THE NUCLEAR OPTION: Forcefully wipe the corrupted submodule cache
        git submodule deinit -f --all
        
        # 3. Download completely fresh using the new preview branch setting
        git submodule update --init --remote --force --recursive

    - name: Commit update
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add --all
        # If there are no new articles, it just echoes rather than crashing
        git commit -m "chore: updating Submodule" || echo "No changes to commit"
        git push origin HEAD
